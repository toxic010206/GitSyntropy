services:
  - type: web
    name: gitsyntropy-api
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    plan: free

    envVars:
      # --- Set these in the Render dashboard (never commit real values) ---
      - key: GS_DATABASE_URL
        sync: false          # paste value in Render dashboard
      - key: GS_JWT_SECRET
        generateValue: true  # Render generates a secure random value automatically
      - key: GS_GITHUB_CLIENT_ID
        sync: false
      - key: GS_GITHUB_CLIENT_SECRET
        sync: false
      - key: GS_GITHUB_REDIRECT_URL
        sync: false          # https://<your-vercel-domain>/auth
      - key: GS_FRONTEND_URL
        sync: false          # https://<your-vercel-domain>
      - key: GS_ANTHROPIC_API_KEY
        sync: false
      - key: GS_ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: GS_SUPERADMIN_GITHUB_HANDLE
        value: 1mystic
      - key: GS_SUPERADMIN_EMAIL
        value: 23f2004201@ss.com
      - key: GS_GITHUB_SCOPE
        value: "read:user user:email"
