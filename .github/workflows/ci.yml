name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Backend — FastAPI + pytest
  # -------------------------------------------------------------------------
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" slowapi

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80 -q

    env:
      GS_DATABASE_URL: ${{ secrets.GS_DATABASE_URL }}
      GS_ANTHROPIC_API_KEY: ${{ secrets.GS_ANTHROPIC_API_KEY }}
      GS_GITHUB_CLIENT_ID: local-dev
      GS_GITHUB_CLIENT_SECRET: ""
      GS_GITHUB_ACCESS_TOKEN: ""
      GS_JWT_SECRET: ci-test-jwt-secret-not-for-production
      GS_FRONTEND_URL: http://localhost:4321

  # -------------------------------------------------------------------------
  # Frontend — Astro build
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_API_URL: http://localhost:8000
