name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  # -------------------------------------------------------------------------
  # Backend deployment to Railway
  # -------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Railway CLI
        uses: addnab/docker-run-action@v3
        with:
          image: node:20-alpine
          options: -e RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN }}
          run: |
            npm i -g @railway/cli
            railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify Slack on backend deployment
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Backend deployment to Railway successful'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Frontend build & deploy to Vercel
  # -------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro project
        run: npm run build
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL_PROD }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/frontend
          production: true
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL_PROD }}

      - name: Comment PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Frontend deployed to Vercel Preview: https://gitsyntropy-preview.vercel.app`
            })

  # -------------------------------------------------------------------------
  # Post-deployment checks
  # -------------------------------------------------------------------------
  health-checks:
    name: Health Checks
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -f ${{ secrets.BACKEND_URL }}/api/v1/health; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 10
          done
          echo "❌ Backend health check failed"
          exit 1

      - name: Check API connectivity
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/api/v1/health)
          if [ $RESPONSE -eq 200 ]; then
            echo "✅ Backend API responding with 200"
          else
            echo "❌ Backend API returned $RESPONSE"
            exit 1
          fi

      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: 'production',
              state: 'success',
              environment_url: '${{ secrets.FRONTEND_URL }}',
              description: 'Deployment successful'
            })

      - name: Slack notification on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ Deployment health checks failed. Investigate immediately.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
