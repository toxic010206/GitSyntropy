<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Auth: Join the Sync</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Handwriting font for the scribble -->
<link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f00ff",
                        "background-light": "#f2f2f2",
                        "background-dark": "#0a0a0f",
                        "electric-teal": "#006666",
                        "neon-green": "#39FF14",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "scribble": ["Reenie Beanie", "cursive"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'mesh-gradient': 'radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom animations for the mesh background */
        @keyframes float {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }
            50% { box-shadow: 0 0 25px rgba(57, 255, 20, 0.5); }
        }
        .mesh-blob {
            animation: float 10s infinite ease-in-out;
        }
        .mesh-blob-2 {
            animation: float 15s infinite ease-in-out reverse;
        }
        .neon-glow-btn:hover {
            animation: pulse-glow 2s infinite;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
    </style>
</head>
<body class="bg-background-dark text-white font-display overflow-x-hidden antialiased h-screen flex flex-col lg:flex-row">
<!-- LEFT PANEL: Brand / Visuals -->
<div class="relative hidden lg:flex w-1/2 h-full flex-col justify-center items-center overflow-hidden bg-[#050508] border-r border-white/5">
<!-- Mesh Gradient Background -->
<div class="absolute inset-0 w-full h-full opacity-60 pointer-events-none">
<div class="mesh-blob absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-primary/40 rounded-full blur-[120px]"></div>
<div class="mesh-blob-2 absolute bottom-[-10%] right-[-10%] w-[70%] h-[70%] bg-electric-teal/30 rounded-full blur-[100px]"></div>
<div class="absolute top-[40%] left-[30%] w-[40%] h-[40%] bg-blue-900/40 rounded-full blur-[80px]"></div>
</div>
<!-- Grid Pattern Overlay -->
<div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 brightness-100 contrast-150"></div>
<div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:64px_64px] [mask-image:radial-gradient(ellipse_at_center,black_40%,transparent_100%)]"></div>
<!-- Content -->
<div class="relative z-10 max-w-xl px-12 flex flex-col gap-8">
<div class="flex flex-col">
<h1 class="text-7xl font-bold tracking-tighter leading-[0.9] text-transparent bg-clip-text bg-gradient-to-br from-white via-white to-white/40 mb-2">
                    SYNC<br/>YOUR CODE.
                </h1>
<h2 class="text-xl text-white/60 font-light tracking-wide mt-4">
                    The intelligence layer for your engineering team.
                </h2>
</div>
<!-- Hand-drawn element -->
<div class="relative mt-8 group cursor-default">
<div class="absolute -left-12 -top-12 text-white/80 transform -rotate-12 transition-transform duration-500 group-hover:rotate-0">
<svg class="opacity-80" fill="none" height="60" stroke="currentColor" stroke-width="2" viewbox="0 0 100 100" width="60">
<path d="M80,20 Q40,40 20,80" stroke-linecap="round"></path>
<path d="M20,80 L35,75 M20,80 L25,65" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<div class="font-scribble text-3xl text-neon-green transform -rotate-6 ml-4">
                    Join 5,000+ Engineers
                </div>
</div>
<!-- Abstract Data Visualization / Bento Component -->
<div class="mt-12 grid grid-cols-3 gap-4 opacity-80">
<div class="col-span-2 h-32 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm p-4 relative overflow-hidden group/card hover:border-primary/50 transition-colors">
<div class="absolute bottom-0 left-0 right-0 h-16 bg-gradient-to-t from-primary/20 to-transparent"></div>
<div class="flex items-end h-full gap-2 px-2 pb-2">
<div class="w-1/4 h-[40%] bg-primary/40 rounded-t-sm animate-pulse"></div>
<div class="w-1/4 h-[70%] bg-primary/60 rounded-t-sm"></div>
<div class="w-1/4 h-[50%] bg-primary/40 rounded-t-sm"></div>
<div class="w-1/4 h-[90%] bg-white/80 rounded-t-sm shadow-[0_0_15px_rgba(255,255,255,0.3)]"></div>
</div>
</div>
<div class="col-span-1 h-32 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm flex items-center justify-center hover:border-neon-green/30 transition-colors">
<span class="material-symbols-outlined text-4xl text-white/40">hub</span>
</div>
</div>
</div>
</div>
<!-- RIGHT PANEL: Login Form -->
<div class="w-full lg:w-1/2 h-full flex flex-col relative bg-background-dark">
<!-- Mobile Mesh Background (only visible on small screens) -->
<div class="absolute inset-0 w-full h-full lg:hidden overflow-hidden pointer-events-none">
<div class="absolute top-[-20%] right-[-20%] w-[80%] h-[80%] bg-primary/20 rounded-full blur-[80px]"></div>
</div>
<div class="flex-1 flex items-center justify-center p-6 lg:p-12 z-10">
<!-- Glassmorphic Login Card -->
<div class="w-full max-w-[420px] bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] rounded-2xl shadow-[0_0_40px_-10px_rgba(0,0,0,0.5)] p-8 lg:p-10 relative overflow-hidden">
<!-- Top Light Reflection -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<div class="flex flex-col gap-6">
<!-- Header -->
<div class="text-center space-y-2">
<h2 class="text-3xl font-bold text-white tracking-tight">Welcome back</h2>
<p class="text-white/50 text-sm">Enter your details to access your workspace.</p>
</div>
<!-- GitHub Button (High Priority) -->
<button class="neon-glow-btn group relative w-full flex items-center justify-center gap-3 bg-[#161b22] hover:bg-[#1f242c] text-white font-medium py-3 px-4 rounded-xl border border-white/10 transition-all duration-300">
<!-- High Fidelity GitHub Icon (SVG) -->
<svg class="h-5 w-5 fill-white" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<title>GitHub</title>
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
<span>Continue with GitHub</span>
<!-- Specific Neon Glow for this button only -->
<div class="absolute inset-0 rounded-xl shadow-[0_0_20px_rgba(57,255,20,0.15)] group-hover:shadow-[0_0_25px_rgba(57,255,20,0.3)] opacity-0 group-hover:opacity-100 transition-all duration-500 pointer-events-none"></div>
</button>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-white/10"></div>
<span class="flex-shrink-0 mx-4 text-xs text-white/40 uppercase tracking-widest font-medium">or sign in with email</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<!-- Email/Password Form -->
<form class="flex flex-col gap-4">
<div class="space-y-1 group">
<label class="text-xs font-semibold text-white/60 ml-1 group-focus-within:text-primary transition-colors" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-white/30 text-[20px] group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-white/[0.02] border border-white/10 focus:border-primary/80 focus:ring-1 focus:ring-primary/50 rounded-lg py-3 pl-10 pr-4 text-sm text-white placeholder-white/20 transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-1 group">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold text-white/60 group-focus-within:text-primary transition-colors" for="password">PASSWORD</label>
<a class="text-xs text-white/40 hover:text-white transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-white/30 text-[20px] group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-white/[0.02] border border-white/10 focus:border-primary/80 focus:ring-1 focus:ring-primary/50 rounded-lg py-3 pl-10 pr-10 text-sm text-white placeholder-white/20 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<button class="mt-2 w-full bg-transparent hover:bg-white/5 border border-white/20 text-white font-medium py-3 rounded-xl transition-all hover:border-white/40 active:scale-[0.98]" type="button">
                            Sign In
                        </button>
</form>
<!-- Footer -->
<p class="text-center text-sm text-white/40">
                        Don't have an account? <a class="text-white font-semibold hover:underline decoration-primary decoration-2 underline-offset-4 hover:text-primary transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Footer Links (Privacy/Terms) -->
<div class="absolute bottom-6 w-full text-center">
<div class="flex justify-center gap-6 text-xs text-white/20">
<a class="hover:text-white/60 transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-white/60 transition-colors" href="#">Terms of Service</a>
</div>
</div>
</div>
</div>
</body></html>
